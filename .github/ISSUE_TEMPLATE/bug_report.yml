name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please run `:checkhealth jovian`
        first — most environment issues surface there.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: "After `:JovianRun` the inline image renders as garbage glyphs in WezTerm 0.x."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal `.py` snippet and the commands you ran.
      placeholder: |
        1. Open `repro.py` with the cell below.
        2. `:JovianRun` on the cell.
        3. The inline output shows ...
      render: shell
    validations:
      required: true

  - type: input
    id: nvim_version
    attributes:
      label: Neovim version
      description: First line of `nvim --version`.
      placeholder: "NVIM v0.10.2"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal + version
      placeholder: "Kitty 0.36 / Ghostty 1.3 / WezTerm 20240203 / ..."
    validations:
      required: true

  - type: input
    id: core_version
    attributes:
      label: jovian-core version / commit
      description: Output of `jovian-core --version`, or the commit SHA if built from source.
      placeholder: "v0.1.0 / abc1234"

  - type: textarea
    id: checkhealth
    attributes:
      label: ":checkhealth jovian output"
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        `~/.cache/jovian/core.log` (Rust core) and any Neovim error messages
        from `:messages`. Trim to the relevant lines.
      render: shell
