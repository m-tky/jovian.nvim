name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lua + Python lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: StyLua Check
        run: nix develop --command stylua --check .
      - name: Lua Linting (Luacheck)
        run: nix develop --command luacheck .
      - name: Python Linting (Ruff)
        run: nix develop --command ruff check .

  rust:
    name: Rust fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: cargo fmt --check
        run: cargo fmt --manifest-path core/Cargo.toml --all -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path core/Cargo.toml --all-targets --locked -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path core/Cargo.toml --locked

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run Tests
        run: nix run .#run-tests
